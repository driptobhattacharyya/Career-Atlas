name: Deploy backend to AWS Lambda

# Pushes to `prod` that touch the backend build backend/Dockerfile, push it
# to ECR (tagged `:latest` and with the commit SHA), then point the
# careeratlas-backend Lambda at the immutable SHA tag. Lambda does NOT follow
# the `:latest` tag, so the explicit update-function-code call IS the deploy;
# we then wait for the function update to finish.
on:
  push:
    branches: [prod]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 072146869341.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: careeratlas-backend
  FUNCTION_NAME: careeratlas-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for GitHub OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::072146869341:role/github-actions-careeratlas
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        run: |
          # --provenance=false: Lambda rejects OCI attestation manifest lists
          docker build --provenance=false --sbom=false -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" backend
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" "$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

      - name: Point Lambda at the new image
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --image-uri "$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" \
            --region "$AWS_REGION"
          aws lambda wait function-updated-v2 \
            --function-name "$FUNCTION_NAME" \
            --region "$AWS_REGION"
