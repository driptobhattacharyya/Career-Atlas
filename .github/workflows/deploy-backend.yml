name: Deploy backend to Cloud Run

# Pushes to `prod` that touch the backend rebuild + redeploy the container.
# Deploys from source (Cloud Build) to the careeratlas-backend service. Existing
# env vars / secrets on the service are preserved — they are NOT set here, so the
# YAML stays free of secret references.
on:
  push:
    branches: [prod]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  PROJECT_ID: project-aaa2b18d-7173-407a-993
  REGION: us-central1
  SERVICE: careeratlas-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/625656057654/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-ci@project-aaa2b18d-7173-407a-993.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy from source
        run: |
          gcloud run deploy "$SERVICE" \
            --source backend \
            --region "$REGION" \
            --quiet
