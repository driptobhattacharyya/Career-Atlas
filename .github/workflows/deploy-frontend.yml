name: Deploy frontend to Cloudflare

# Pushes to `prod` that touch the frontend rebuild + redeploy the Worker.
on:
  push:
    branches: [prod]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install + build
        working-directory: frontend
        run: |
          bun install
          bun run build

      - name: Deploy to Cloudflare
        working-directory: frontend
        # vite build (@cloudflare/vite-plugin) emits the deployable worker +
        # generated config to dist/server/. Deploying the ROOT wrangler.jsonc
        # (main: src/server.ts) makes wrangler re-bundle source and fail on
        # TanStack's build-time virtual modules — deploy the built config instead.
        run: bunx wrangler deploy -c dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
