name: Deploy frontend to Cloudflare

# Pushes to `prod` that touch the frontend rebuild + redeploy the Worker.
on:
  push:
    branches: [prod]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install + build
        working-directory: frontend
        run: |
          bun install
          bun run build

      - name: Deploy to Cloudflare
        working-directory: frontend
        # @cloudflare/vite-plugin emits the deployable worker + a generated
        # wrangler.json under dist/<env>/ (the dir name varies by plugin version).
        # Deploying the ROOT wrangler.jsonc (main: src/server.ts) makes wrangler
        # re-bundle source and fail on TanStack's build-time virtual modules, so
        # discover the generated config and deploy that instead.
        run: |
          CONFIG="$(find dist -name wrangler.json | head -1)"
          echo "Deploying with generated config: $CONFIG"
          test -n "$CONFIG" || { echo "No generated wrangler.json found under dist/"; ls -R dist | head -50; exit 1; }
          bunx wrangler deploy -c "$CONFIG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
